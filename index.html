<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Validator</title>
</head>
<body>
    <div class="container">
        <h1>Credit Card Validator</h1>
        
        <div class="cards-icons" id="cardsIcons">
            <div class="card-icon" data-card="visa">
                <img src="images/visa.png" alt="Visa">
            </div>
            <div class="card-icon" data-card="mastercard">
                <img src="images/mastercard.png" alt="Mastercard">
            </div>
            <div class="card-icon" data-card="amex">
                <img src="images/amex.png" alt="American Express">
            </div>
            <div class="card-icon" data-card="discover">
                <img src="images/discover.png" alt="Discover">
            </div>
            <div class="card-icon" data-card="jcb">
                <img src="images/jcb.png" alt="JCB">
            </div>
            <div class="card-icon" data-card="diners">
                <img src="images/diners.png" alt="Diners Club">
            </div>
            <div class="card-icon" data-card="mir">
                <img src="images/mir.png" alt="Мир">
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="cardNumber" placeholder="Введите номер карты" maxlength="19">
            <button id="validateBtn">Click to Validate</button>
        </div>

        <div class="result" id="result"></div>
    </div>
</body>
</html>
